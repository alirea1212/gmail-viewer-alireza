<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DNS Generator</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="background-grid"></div>

<header>
    <h1>Create by Alireza-Namdar + AI</h1>
    <p class="subtitle">Smart Gaming DNS Generator System</p>
</header>

<div class="device-select">

    <h2>Select Device</h2>

    <div class="device-buttons">
        <button id="mobileBtn">📱 Mobile</button>
        <button id="pcBtn">🖥 PC</button>
    </div>

</div>

<div class="main-panel hidden">

    <div class="country-panel">

        <h2>Select Country</h2>

        <div class="countries">

            <button class="country" data-country="Germany">🇩🇪 Germany</button>
            <button class="country" data-country="Turkey">🇹🇷 Turkey</button>
            <button class="country" data-country="India">🇮🇳 India</button>
            <button class="country" data-country="UAE">🇦🇪 UAE</button>

        </div>

    </div>

    <div class="control-panel">

        <button id="startTest">⚡ Start Smart Scan</button>

    </div>

    <div class="stats">

        <div class="card">
            <h3>Working DNS</h3>
            <span id="workingCount">0</span>
        </div>

        <div class="card">
            <h3>Dead DNS</h3>
            <span id="deadCount">0</span>
        </div>

        <div class="card">
            <h3>Best Ping</h3>
            <span id="bestPing">0 ms</span>
        </div>

    </div>

    <div class="dns-list" id="dnsList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
