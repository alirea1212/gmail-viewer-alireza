<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UltraTools</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<header>

<h1>🚀 Ultra Tools</h1>

<p>
مجموعه ابزار های حرفه ای و کاربردی
</p>

</header>

<section class="tools-container">

<div class="card">
<h2>🕒 ساعت ایران</h2>
<div id="clock"></div>
</div>

<div class="card">
<h2>🧮 ماشین حساب</h2>

<input type="number" id="num1" placeholder="عدد اول">

<input type="number" id="num2" placeholder="عدد دوم">

<button onclick="calculate()">جمع</button>

<div id="calcResult"></div>

</div>

<div class="card">
<h2>🌡️ تبدیل دما</h2>

<input type="number" id="temp">

<button onclick="convertTemp()">
تبدیل به فارنهایت
</button>

<div id="tempResult"></div>

</div>

<div class="card">
<h2>📅 تاریخ امروز</h2>

<div id="date"></div>

</div>

<div class="card">
<h2>🎲 عدد تصادفی</h2>

<button onclick="randomNumber()">
تولید کن
</button>

<div id="randomResult"></div>

</div>

<div class="card">
<h2>💡 نقل قول انگیزشی</h2>

<button onclick="quoteGenerator()">
نمایش
</button>

<div id="quote"></div>

</div>

<div class="card">
<h2>🌙 دارک مود</h2>

<button onclick="toggleMode()">
تغییر حالت
</button>

</div>

<div class="card">
<h2>📏 تبدیل متر به سانتی متر</h2>

<input type="number" id="meter">

<button onclick="convertMeter()">
تبدیل
</button>

<div id="meterResult"></div>

</div>

<div class="card">
<h2>⌛ تایمر</h2>

<input type="number" id="seconds" placeholder="ثانیه">

<button onclick="startTimer()">
شروع
</button>

<div id="timer"></div>

</div>

<div class="card">
<h2>🔋 درصد باتری</h2>

<button onclick="batteryInfo()">
نمایش
</button>

<div id="battery"></div>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
